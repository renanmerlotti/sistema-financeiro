services:
  db:
    image: mysql:8.0
    container_name: financas-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: financas
      MYSQL_USER: financas
      MYSQL_PASSWORD: financas
    ports:
      - "3306:3306"
    volumes:
      - financas-db-data:/var/lib/mysql
    networks:
      - financas-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "financas", "-pfinancas"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: financas-backend
    environment:
      DB_HOST: db
    ports:
      - "8080:8080"
    networks:
      - financas-network
    depends_on:
      db:
        condition: service_healthy

networks:
  financas-network:
    driver: bridge

volumes:
  financas-db-data:
